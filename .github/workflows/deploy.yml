name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # 支持手动触发

env:
  REGISTRY: swr.cn-north-4.myhuaweicloud.com
  FRONTEND_IMAGE: aimpad/aimpad
  API_IMAGE: aimpad/api

jobs:
  # ============================================
  # Job 1: 构建并推送前端 + API Docker 镜像到华为云 SWR
  # ============================================
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (frontend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          provenance: false
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  # ============================================
  # Job 2: 更新 GitOps 仓库中的镜像 tag
  # 将 docker-compose.yml 中的版本号更新为本次构建的 SHA，推回仓库
  # ============================================
  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_REPO_TOKEN }}

      - name: Update image tags in docker-compose.yml
        run: |
          NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          FRONTEND="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}"
          API="${{ env.REGISTRY }}/${{ env.API_IMAGE }}"
          sed -i "s|${FRONTEND}:[^ ]*|${FRONTEND}:${NEW_TAG}|g" docker-compose.yml
          sed -i "s|${API}:[^ ]*|${API}:${NEW_TAG}|g" docker-compose.yml
          echo "Updated frontend tag to: ${FRONTEND}:${NEW_TAG}"
          echo "Updated API tag to: ${API}:${NEW_TAG}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update image tags to ${{ needs.build-and-push.outputs.image_tag }}"
          git push

  # ============================================
  # Job 3: SSH 远程触发 ECS 部署（替代 Watchtower 轮询）
  # 仓库标签更新完成后，服务器立刻拉取最新代码并重新部署
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: update-gitops          # 必须等 gitops 更新完成，保证仓库里 tag 是最新的
    steps:
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/aimpad
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            # 如果主机 nginx 配置有变化，可在此处重新加载
            nginx -s reload || true