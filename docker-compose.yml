# /opt/aimpad/docker-compose.yml

services:
  # ============================================
  # AimPad 前端（Nginx 静态文件服务）
  # ============================================
  aimpad:
    image: swr.cn-north-4.myhuaweicloud.com/aimpad/aimpad:latest
    container_name: aimpad
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      aimpad-api:
        condition: service_healthy
    networks:
      - aimpad-net

  # ============================================
  # AimPad API 后端（Node.js + Express）
  # ============================================
  aimpad-api:
    image: swr.cn-north-4.myhuaweicloud.com/aimpad/api:latest
    container_name: aimpad-api
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: aimpad_user
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: aimpad
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - aimpad-net

  # ============================================
  # MySQL 8.0 数据库
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: aimpad
      MYSQL_USER: aimpad_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./config/mysql/custom.cnf:/etc/mysql/conf.d/custom.cnf:ro
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aimpad-net

  # ============================================
  # Redis 7.x 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aimpad-net

# ============================================
# 命名卷（Docker 管理，解决 bind mount 权限问题）
# ============================================
volumes:
  mysql-data:
  redis-data:

# ============================================
# 网络配置
# ============================================
networks:
  aimpad-net:
    driver: bridge
